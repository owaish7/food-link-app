name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs of the same branch/PR when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (auth + e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start server (in-memory DB) and run tests
        working-directory: server
        env:
          USE_MOCK_DB: '1'
          JWT_SECRET: ci-secret
          PORT: '8800'
          CLIENT_ORIGIN: 'http://localhost:5173,http://localhost:8800'
          CROSS_SITE_COOKIES: '0'
          FLASK_DEBUG: '0'
        run: |
          python app.py &
          SERVER_PID=$!
          echo "Waiting for server on :8800..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null http://localhost:8800/orders/x; then
              echo "Server is up"; break
            fi
            sleep 1
          done
          set -e
          python tests/test_authz.py
          python tests/test_e2e.py
          kill $SERVER_PID 2>/dev/null || true

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install and build
        working-directory: client
        run: |
          npm ci
          npm run build
